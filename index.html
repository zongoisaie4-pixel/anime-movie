<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Movie - Intégral</title>
    <style>
        :root {
            --bg-dark: #060913;
            --surface: #0f1322;
            --surface-accent: #171d31;
            --primary: #ff2a54;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-gold: #ffbe1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 90px; }

        header {
            background: rgba(15, 19, 34, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            position: sticky;
            top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .app-logo { width: 40px; height: 40px; border-radius: 12px; border: 2px solid var(--primary); }
        header h1 { font-size: 1.4rem; font-weight: 800; }
        header h1 span { color: var(--primary); }

        .section-title { padding: 25px 20px 10px 20px; font-size: 1.3rem; font-weight: 700; }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            padding: 15px 20px;
        }
        .anime-card {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .anime-card:hover { transform: translateY(-5px); }
        .poster-box { width: 100%; height: 200px; border-radius: 8px; overflow: hidden; position: relative; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .anime-card-title { font-size: 0.9rem; font-weight: 600; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .details-panel {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            z-index: 150;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .btn-back {
            background-color: var(--surface-accent);
            color: white; border: none; padding: 10px 18px;
            border-radius: 8px; font-weight: 700; cursor: pointer;
            align-self: flex-start; margin-bottom: 20px;
        }
        .details-hero { display: flex; gap: 20px; margin-bottom: 30px; }
        .details-poster { width: 120px; height: 180px; border-radius: 10px; object-fit: cover; }
        .details-info h2 { font-size: 1.8rem; margin-bottom: 10px; }
        .details-info p { color: var(--text-muted); font-size: 0.9rem; }

        .seasons-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--surface-accent); padding-bottom: 10px; }
        .tab-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 1rem; font-weight: 600; padding: 8px 16px; cursor: pointer;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .episodes-list { display: flex; flex-direction: column; gap: 12px; }
        .episode-item {
            background-color: var(--surface);
            padding: 14px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .ep-title { font-weight: 600; font-size: 0.95rem; }
        .btn-watch {
            background-color: var(--primary); color: white;
            border: none; padding: 6px 14px; border-radius: 6px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer;
        }

        .video-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: none;
            justify-content: center; align-items: center;
        }
        .video-modal video { width: 100%; max-width: 900px; }
        .btn-close-video { position: absolute; top: 20px; right: 20px; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img class="app-logo" src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=150" alt="Logo">
            <h1>Anime<span>Movie</span></h1>
        </div>
    </header>

    <div class="section-title">Catalogue des Animés Complets</div>
    <div class="anime-grid" id="mainGrid"></div>

    <div class="details-panel" id="detailsPanel">
        <button class="btn-back" onclick="fermerDetails()">⬅️ Retour au catalogue</button>
        <div class="details-hero">
            <img class="details-poster" id="panelPoster" src="" alt="">
            <div class="details-info">
                <h2 id="panelTitle">Titre de l'animé</h2>
                <p id="panelDesc">Description de l'animé...</p>
            </div>
        </div>
        <div class="seasons-tabs" id="seasonsTabs"></div>
        <div class="episodes-list" id="episodesList"></div>
    </div>

    <div class="video-modal" id="videoModal">
        <button class="btn-close-video" onclick="fermerVideo()">✕ Fermer</button>
        <video id="player" controls></video>
    </div>

    <script>
        const databaseAnime = [
            {
                id: "ds",
                title: "Demon Slayer",
                description: "Le voyage de Tanjiro pour sauver sa sœur Nezuko, transformée en démon, et venger sa famille.",
                poster: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400",
                saisons: {
                    "Saison 1": [
                        { name: "Épisode 1: Cruauté", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
                        { name: "Épisode 2: Le formateur Sakonji Urokodaki", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" },
                        { name: "Épisode 3: Sabito et Makomo", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4" }
                    ],
                    "Saison 2": [
                        { name: "Épisode 1: Le pilier de la flamme", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" },
                        { name: "Épisode 2: Deep Sleep", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4" }
                    ]
                }
            },
            {
                id: "aot",
                title: "Attack on Titan",
                description: "L'humanité lutte pour sa survie face à de gigantesques créatures anthropophages, les Titans.",
                poster: "https://images.unsplash.com/photo-1560169897-fc0cdbdfa4d5?w=400",
                saisons: {
                    "Saison 1": [
                        { name: "Épisode 1: À toi qui vis 2000 ans plus tard", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4" },
                        { name: "Épisode 2: Ce jour-là", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" }
                    ]
                }
            },
            {
                id: "op",
                title: "One Piece",
                description: "Monkey D. Luffy explore les mers à la recherche du trésor suprême afin de devenir le Roi des Pirates.",
                poster: "https://images.unsplash.com/photo-1627556587304-4cc996c5b058?w=400",
                saisons: {
                    "Saga East Blue": [
                        { name: "Épisode 1: Je suis Luffy !", file: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" }
                    ]
                }
            }
        ];

        let animeSelectionne = null;

        function chargerCatalogue() {
            const grille = document.getElementById('mainGrid');
            grille.innerHTML = "";
            databaseAnime.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = () => ouvrirDetails(anime);
                card.innerHTML = `
                    <div class="poster-box">
                        <img src="${anime.poster}" alt="${anime.title}">
                    </div>
                    <div class="anime-card-title">${anime.title}</div>
                `;
                grille.appendChild(card);
            });
        }

        function ouvrirDetails(anime) {
            animeSelectionne = anime;
            document.getElementById('panelTitle').innerText = anime.title;
            document.getElementById('panelDesc').innerText = anime.description;
            document.getElementById('panelPoster').src = anime.poster;

            const tabsContainer = document.getElementById('seasonsTabs');
            tabsContainer.innerHTML = "";
            const nomsSaisons = Object.keys(anime.saisons);

            nomsSaisons.forEach((saison, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = saison;
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    chargerEpisodes(saison);
                };
                tabsContainer.appendChild(btn);
            });

            chargerEpisodes(nomsSaisons[0]);
            document.getElementById('detailsPanel').style.display = "flex";
        }

        function chargerEpisodes(nomSaison) {
            const container = document.getElementById('episodesList');
            container.innerHTML = "";
            const episodes = animeSelectionne.saisons[nomSaison];

            episodes.forEach(ep => {
                const item = document.createElement('div');
                item.className = 'episode-item';
                item.innerHTML = `
                    <div class="ep-title">${ep.name}</div>
                    <button class="btn-watch" onclick="lancerVideo('${ep.file}')">▶️ Lancer</button>
                `;
                container.appendChild(item);
            });
        }

        function fermerDetails() {
            document.getElementById('detailsPanel').style.display = "none";
        }

        function lancerVideo(url) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('player');
            player.src = url;
            modal.style.display = "flex";
            player.play();
        }

        function fermerVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('player');
            player.pause();
            player.src = "";
            modal.style.display = "none";
        }

        window.onload = chargerCatalogue;
    </script>
</body>
  </html>
